<header class="flex flex-row h-16 md:h-20 w-full justify-between px-4 border-b border-slate-200/70 dark:border-slate-800/70">
  {{- $url := .RelPermalink -}}<!---->
  {{- with site.Menus.main -}}
  <nav class="flex items-center gap-8 w-full">
    <a class="hover:underline grow-2 text-xl py-2" href="/">{{ site.Title }}</a>
    {{- range . -}}
    {{ if $.IsMenuCurrent .Menu . }}
    <a class="hover:underline active block text-center text-xl py-2" aria-current="page" href="{{ .URL }}">{{ .Name }}</a>
    {{ else }}
    <a class="hover:underline text-xl py-2" href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    {{- end -}}
  </nav>
  {{- end -}}<!---->
</header>
